name: 'Web Fork CI'

on:
  pull_request:
    branches:
      - 'main'
  push:
    branches:
      - 'main'
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref }}'
  cancel-in-progress: true

permissions:
  contents: 'read'

defaults:
  run:
    shell: 'bash'

jobs:
  web:
    name: 'Web checks'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5

      - name: 'Set up Node.js'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020' # ratchet:actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 'Install dependencies'
        run: 'npm ci'

      - name: 'Check lockfile'
        run: 'npm run check:lockfile'

      - name: 'Build core package'
        run: 'npm run build -w @google/gemini-cli-core'

      - name: 'Build CLI package'
        run: 'npm run build -w @google/gemini-cli'

      - name: 'Build SDK'
        run: 'npm run build -w @google/gemini-cli-sdk'

      - name: 'Run web server tests'
        run: 'npm test -w @google/gemini-cli-web-server'

      - name: 'Build web client'
        run: 'npm run build -w @google/gemini-cli-web-client'

      - name: 'Build web server'
        run: 'npm run build -w @google/gemini-cli-web-server'
